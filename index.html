<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unedits</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f0f0f;
            color:white;
        }

        nav{
            padding:20px 10%;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:15px;
        }

        .hero p{
            font-size:20px;
            color:#ccc;
            margin-bottom:25px;
        }

        .btn{
            background:#6c63ff;
            color:white;
            text-decoration:none;
            padding:12px 25px;
            border-radius:8px;
        }

        footer{
            text-align:center;
            padding:30px;
            color:#999;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">UNEDITS</div>
</nav>

<section class="hero">
    <h1>Creative Solutions For Modern Brands</h1>
    <p>Video Editing • Graphic Design • Branding</p>
    <a href="#" class="btn">Contact Us</a>
</section>

<footer>
    © 2026 UNEDITS. All Rights Reserved.
</footer>

</body>
</html>
