<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNEDITS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0E1A;
    --ink: #F5F3EE;
    --muted: #8A90A6;
    --accent: #C9A24B;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    color:var(--ink);
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
    font-family:'Space Grotesk', sans-serif;
    position:relative;
    background-color:var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(45,60,120,0.55) 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(90,50,130,0.4) 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, rgba(30,40,90,0.6) 0%, transparent 55%),
      radial-gradient(circle at 90% 80%, rgba(60,35,90,0.35) 0%, transparent 45%);
    background-attachment:fixed;
  }

  .mark{
    font-family:'Montserrat', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 4.5vw, 42px);
    letter-spacing:0.18em;
    color:var(--ink);
    margin-bottom:32px;
  }

  .mark{
    margin-bottom:32px;
  }

  .rule{
    width:36px;
    height:1px;
    background:var(--accent);
    margin:0 auto 48px auto;
  }

  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:clamp(38px, 6vw, 64px);
    letter-spacing:0.01em;
    line-height:1.1;
  }

  p{
    margin-top:22px;
    font-size:15px;
    color:var(--muted);
    letter-spacing:0.02em;
    max-width:380px;
  }

  form{
    margin-top:44px;
    display:flex;
    width:100%;
    max-width:360px;
    border-bottom:1px solid rgba(245,243,238,0.2);
    padding-bottom:12px;
  }

  input[type="email"]{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    font-size:14px;
    letter-spacing:0.01em;
    padding:4px 0;
  }

  input::placeholder{ color:var(--muted); }

  button{
    background:none;
    border:none;
    color:var(--accent);
    font-family:'Space Grotesk', sans-serif;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    padding:4px 0 4px 16px;
  }

  button:hover{ color:var(--ink); }

  input:focus-visible, button:focus-visible{
    outline:1px solid var(--accent);
    outline-offset:4px;
  }

  footer{
    position:fixed;
    bottom:32px;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
    opacity:0.6;
  }
</style>
</head>
<body>

  <div class="mark">UNEDITS</div>
  <div class="rule"></div>

  <h1>Every Detail Matters</h1>
  <p>We are crafting distinctive identities through thoughtful design, strategic thinking, and uncompromising craftsmanship.</p>
  
  <p>" Comming Soon "</p>

  <form action="https://formspree.io/f/mzdlnjlo" method="POST">
    <input type="email" name="email" placeholder="Your email" required aria-label="Email address">
    <button type="submit">Notify</button>
  </form>

  <footer>&copy; 2026 UNEDITS</footer>

</body>
</html>
